<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuo Ma - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px 40px;
            text-align: center;
            color: white;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .header .title {
            font-size: 1.1em;
            opacity: 0.9;
            font-weight: 300;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section h2 {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
        }

        .section p {
            color: #555;
            line-height: 1.8;
            font-size: 1.05em;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-item .icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 18px;
        }

        .contact-item .info {
            flex: 1;
        }

        .contact-item .label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 2px;
        }

        .contact-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .contact-item a:hover {
            color: #764ba2;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: 500;
        }

        @media (max-width: 500px) {
            .header {
                padding: 35px 25px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 25px;
            }

            .avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">👤</div>
            <h1>Shuo Ma</h1>
            <p class="title">国防科技大学 硕士研究生</p>
        </div>
        <div class="content">
            <div class="section">
                <h2>关于我</h2>
                <p>我是国防科技大学的一名硕士研究生，主要接触和开展RAG相关工作。致力于在学术领域不断学习，期待向各位老师、学长请教。</p>
            </div>
            <div class="section">
                <h2>联系方式</h2>
                <div class="contact-item">
                    <div class="icon">✉</div>
                    <div class="info">
                        <div class="label">电子邮件</div>
                        <a href="mailto:shuoma@nudt.edu.cn">shuoma@nudt.edu.cn</a>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="icon">🏛</div>
                    <div class="info">
                        <div class="label">所属机构</div>
                        <span>国防科技大学 (NUDT)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
